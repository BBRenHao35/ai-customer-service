services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aics}
      POSTGRES_USER: ${POSTGRES_USER:-aics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aics}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aics}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aics}:${POSTGRES_PASSWORD:-aics}@postgres:5432/${POSTGRES_DB:-aics}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    volumes:
      - ./api:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
